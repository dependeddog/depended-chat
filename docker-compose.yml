services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # URL БД для async SQLAlchemy/asyncpg
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/chat
      # URL брокера сообщений
      AMQP_URL: amqp://guest:guest@broker:5672/
      APP_MODULE: src.main:app
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - appnet

  broker:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Web UI (опционально)
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  postgres_data:
