services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # URL БД для async SQLAlchemy/asyncpg
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/chat
      APP_MODULE: src.main:app
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    ports:
      - "8000:8000"
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  postgres_data:
